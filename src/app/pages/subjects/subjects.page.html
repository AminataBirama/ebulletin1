<ion-header>

  <ion-toolbar color="primary">

    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>

    <ion-title>
      Gestion des Matières
    </ion-title>

    <ion-buttons slot="end">

      <ion-button (click)="openAdd()">

        <ion-icon
          slot="icon-only"
          name="add-outline">
        </ion-icon>

      </ion-button>

    </ion-buttons>

  </ion-toolbar>

</ion-header>

<ion-content class="ion-padding">

  <!-- Recherche -->

  <ion-searchbar

    placeholder="Rechercher une matière"

    (ionInput)="onSearch($event)">

  </ion-searchbar>

  <!-- Liste -->

  <ion-list>

    @for(subject of filteredSubjects; track subject.id){

      <ion-item>

        <ion-label>

          <h2>

            {{ subject.libelle }}

          </h2>

          <p>

            Code : {{ subject.code }}

          </p>

          <p>

            Coefficient : {{ subject.coefficient }}

          </p>

        </ion-label>

        <ion-button

          fill="clear"

          color="warning"

          (click)="openEdit(subject)">

          <ion-icon
            name="create-outline">
          </ion-icon>

        </ion-button>

        <ion-button

          fill="clear"

          color="danger"

          (click)="confirmDelete(subject)">

          <ion-icon
            name="trash-outline">
          </ion-icon>

        </ion-button>

      </ion-item>

    }

  </ion-list>

  <!-- Bouton flottant -->

  <ion-fab
    vertical="bottom"
    horizontal="end"
    slot="fixed">

    <ion-fab-button (click)="openAdd()">

      <ion-icon
        name="add-outline">
      </ion-icon>

    </ion-fab-button>

  </ion-fab>

  <!-- Modal -->

  <ion-modal [isOpen]="showModal">

    <ng-template>

      <ion-header>

        <ion-toolbar color="primary">

          <ion-title>

            {{ isEditing ? 'Modifier une matière' : 'Ajouter une matière' }}

          </ion-title>

        </ion-toolbar>

      </ion-header>

      <ion-content class="ion-padding">

        <ion-input

          label="Code"

          labelPlacement="stacked"

          [(ngModel)]="form.code">

        </ion-input>

        <ion-input

          label="Libellé"

          labelPlacement="stacked"

          [(ngModel)]="form.libelle">

        </ion-input>

        <ion-input

          type="number"

          label="Coefficient"

          labelPlacement="stacked"

          [(ngModel)]="form.coefficient">

        </ion-input>

        <br>

        <ion-button

          expand="block"

          (click)="save()">

          {{ isEditing ? 'Modifier' : 'Ajouter' }}

        </ion-button>

        <ion-button

          expand="block"

          fill="outline"

          color="medium"

          (click)="closeModal()">

          Annuler

        </ion-button>

      </ion-content>

    </ng-template>

  </ion-modal>

</ion-content>
