<ion-app>

  <ion-split-pane contentId="main-content">

    <!-- Menu latéral -->
    <ion-menu contentId="main-content" type="overlay">

      <ion-content>

        <ion-list id="inbox-list">

          <!-- En-tête -->
          <ion-list-header>eBulletin</ion-list-header>

          <ion-note>
            Gestion des Bulletins Scolaires
          </ion-note>

          <!-- Menu -->
          @for (p of appPages; track p.url) {

            <ion-menu-toggle auto-hide="false">

              <ion-item
                routerDirection="root"
                [routerLink]="[p.url]"
                lines="none"
                detail="false"
                routerLinkActive="selected">

                <ion-icon
                  slot="start"
                  [ios]="p.icon + '-outline'"
                  [md]="p.icon + '-sharp'">
                </ion-icon>

                <ion-label>
                  {{ p.title }}
                </ion-label>

              </ion-item>

            </ion-menu-toggle>

          }

        </ion-list>

      </ion-content>

    </ion-menu>

    <!-- Contenu principal -->
    <ion-router-outlet id="main-content">
    </ion-router-outlet>

  </ion-split-pane>

</ion-app>
